<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eMotion Air - 蓝牙固件升级工具</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>eMotion Air</h1>
            <p class="subtitle">蓝牙 Web OTA 升级工具</p>
        </header>

        <main>
            <section class="card device-card">
                <div class="status-header">
                    <span id="connection-status" class="status-dot"></span>
                    <span id="status-text">未连接</span>
                </div>
                <div class="device-info">
                    <p>目标设备: <strong id="target-device-name">eMotion Air</strong></p>
                    <p>设备版本: <span id="current-device-version">--</span></p>
                    <div class="key-box">
                        <p>AES Key: <code id="aes-key-val">未读取</code></p>
                        <button id="read-key-btn" class="mini-btn">读取 Key</button>
                    </div>
                </div>
                <button id="connect-btn" class="primary-btn">连接设备</button>
            </section>

            <nav class="tab-nav" id="main-nav" style="display: none;">
                <button class="tab-btn active" data-tab="sensor">实时监控</button>
                <button class="tab-btn" data-tab="ota">固件升级</button>
            </nav>

            <div id="tab-sensor" class="tab-pane active">
                <section class="card sensor-card">
                    <h3>实时传感器数据</h3>
                    <div class="sensor-grid">
                        <div class="sensor-item">
                            <span class="label">温度</span>
                            <span id="val-temp" class="value">--</span><span class="unit">°C</span>
                        </div>
                        <div class="sensor-item">
                            <span class="label">湿度</span>
                            <span id="val-hum" class="value">--</span><span class="unit">%</span>
                        </div>
                        <div class="sensor-item">
                            <span class="label">亮度</span>
                            <span id="val-lux" class="value">--</span><span class="unit">lux</span>
                        </div>
                        <div class="sensor-item">
                            <span class="label">电量</span>
                            <span id="val-bat" class="value">--</span><span class="unit">%</span>
                        </div>
                        <div class="sensor-item">
                            <span class="label">人体状态</span>
                            <span id="val-motion" class="value">--</span>
                        </div>
                        <div class="sensor-item">
                            <span class="label">最近按键</span>
                            <span id="val-button" class="value">--</span>
                        </div>
                    </div>
                </section>
            </div>

            <div id="tab-ota" class="tab-pane">
                <section class="card firmware-card">
                    <h3>最新固件信息</h3>
                    <div id="firmware-details">
                        <p>设备当前版本: <span id="device-ota-version" style="color: var(--accent-color); font-weight: bold;">--</span></p>
                        <p>云端最新版本: <span id="fw-version">正在加载...</span></p>
                        <p>固件文件名: <span id="fw-filename">--</span></p>
                    </div>
                    <div class="progress-container" id="progress-container" style="display: none;">
                        <div class="progress-bar">
                            <div id="progress-fill" class="progress-fill"></div>
                        </div>
                        <span id="progress-percent">0%</span>
                    </div>
                    <button id="upgrade-btn" class="secondary-btn" disabled>开始升级</button>
                </section>
            </div>

            <section class="card log-card">
                <h3>运行日志</h3>
                <div id="log-view" class="log-view">
                    <p class="log-entry system">系统就绪，请连接设备。</p>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 StarStarDust. Powered by Web Bluetooth API.</p>
        </footer>
    </div>
    <script src="ota.js"></script>
</body>
</html>
