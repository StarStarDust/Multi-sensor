blueprint:
  name: LinknLink eMotion Air Smart Button Controller
  description: |
    Automation blueprint for eMotion Air (Zigbee version).
    Supports single, double, triple, long press, and release actions.
  domain: automation
  input:
    remote:
      name: Select eMotion Air Device
      selector:
        device:
          integration: zha
          model: eMotion Air
    single_press:
      name: Single Press Action
      default: []
      selector:
        action: {}
    double_press:
      name: Double Press Action
      default: []
      selector:
        action: {}
    triple_press:
      name: Triple Press Action
      default: []
      selector:
        action: {}
    long_press:
      name: Long Press Action (Hold)
      default: []
      selector:
        action: {}
    release:
      name: Release Action
      default: []
      selector:
        action: {}

mode: restart
max_exceeded: silent

trigger:
  - platform: event
    event_type: zha_event
    event_data:
      device_id: !input remote

action:
  - variables:
      command: "{{ trigger.event.data.command }}"
  - choose:
      - conditions: "{{ command == 'toggle' }}"
        sequence: !input single_press
      - conditions: "{{ command == 'on' }}"
        sequence: !input double_press
      - conditions: "{{ command == 'off' }}"
        sequence: !input triple_press
      - conditions: "{{ command == 'move' }}"
        sequence: !input long_press
      - conditions: "{{ command == 'stop' }}"
        sequence: !input release
